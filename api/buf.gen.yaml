version: v1
plugins:
  - plugin: go
    out: ./
  
  - plugin: go-grpc
    out: ./
  
  - plugin: grpc-gateway
    out: ./
    opt:
      - generate_unbound_methods=true
  
  - plugin: openapiv2
    out: docs
  
  - plugin: validate
    out: ./
    opt:
      - lang=go

  #  ts_proto disabled: requires ui/node_modules to be installed
  - name: ts_proto
    path: ../ui/node_modules/.bin/protoc-gen-ts_proto
    out: ../ui/src/apis/
    opt:
      - esModuleInterop=true
      - forceLong=string
      - outputServices=grpc-js
