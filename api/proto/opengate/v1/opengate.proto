syntax = "proto3";
package opengate.v1;

option go_package = "./opengate_v1";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "proto/opengate/common/ping.proto";
import "proto/opengate/v1/config.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "OpenGate API"
    version: "v1.0.0"
    description: "OpenGate API Gateway - Configuration and Route Management"
  }

  security_definitions: {
    security: {
      key: "UserID"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "X-User-Id"
        description: "User ID for identification."
      }
    }
    security: {
      key: "Permissions"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "X-User-Perms"
        description: "Comma-separated list of user permissions."
      }
    }
  }
  security: [
    {
      security_requirement: {
        key: "UserID"
        value: {}
      }
      security_requirement: {
        key: "Permissions"
        value: {}
      }
    }
  ]
  tags: [
    {
      name: "Ping"
      description: "Health check endpoints"
    },
    {
      name: "Configs"
      description: "Endpoints for managing route configurations"
    },
    {
      name: "Routes"
      description: "Endpoints for retrieving routes for routing"
    }
  ]
};

service OpenGateService {
    
    // Ping is a simple GET request that returns a Pong message.
    rpc Ping (PingRequest) returns (PingResponse) {
        option (google.api.http) = {
            get: "/opengate/v1/ping"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Ping"
            summary: "Ping the server"
            description: "Check if the server is alive."
        };
    }

    // CreateConfig creates a new route configuration
    rpc CreateConfig (CreateConfigRequest) returns (CreateConfigResponse) {
        option (google.api.http) = {
            post: "/opengate/v1/configs"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Configs"
            summary: "Create a new config"
            description: "Create a new route configuration. Name must be unique."
        };
    }

    // GetConfig retrieves a config by ID
    rpc GetConfig (GetConfigRequest) returns (GetConfigResponse) {
        option (google.api.http) = {
            get: "/opengate/v1/configs/{id}"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Configs"
            summary: "Get a config by ID"
            description: "Retrieve a route configuration by its ID."
        };
    }

    // ListConfigs lists configs with pagination
    rpc ListConfigs (ListConfigsRequest) returns (ListConfigsResponse) {
        option (google.api.http) = {
            get: "/opengate/v1/configs"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Configs"
            summary: "List configs"
            description: "List route configurations with pagination support."
        };
    }

    // UpdateConfig updates an existing config
    rpc UpdateConfig (UpdateConfigRequest) returns (UpdateConfigResponse) {
        option (google.api.http) = {
            put: "/opengate/v1/configs/{id}"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Configs"
            summary: "Update a config"
            description: "Update an existing route configuration."
        };
    }

    // DeleteConfig deletes a config by ID
    rpc DeleteConfig (DeleteConfigRequest) returns (DeleteConfigResponse) {
        option (google.api.http) = {
            delete: "/opengate/v1/configs/{id}"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Configs"
            summary: "Delete a config"
            description: "Delete a route configuration by its ID."
        };
    }

    // GetRoutes retrieves all routes for routing purposes
    rpc GetRoutes (GetRoutesRequest) returns (GetRoutesResponse) {
        option (google.api.http) = {
            get: "/opengate/v1/routes"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Routes"
            summary: "Get all routes"
            description: "Retrieve all routes for the routing manager."
        };
    }
}
